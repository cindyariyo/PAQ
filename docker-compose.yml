version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      # DB file lives on the HOST machine, not inside the container.
      # This means: restarts don't wipe data, and you can copy it anytime.
      - ./data/fyp.db:/app/fyp.db
    environment:
      - DB_PATH=/app/fyp.db
      - ADMIN_KEY=${ADMIN_KEY:-changeme}   # set this in .env before deploying
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
