<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Quiz</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Hint card ── */
    .hint-card {
      border-radius: 14px;
      border: 1px solid rgba(255,200,60,0.0);
      background: rgba(255,180,0,0.0);
      padding: 0; max-height: 0; overflow: hidden; opacity: 0;
      transition: max-height 0.45s ease, opacity 0.4s ease,
        padding 0.35s ease, border-color 0.4s ease,
        background 0.4s ease, box-shadow 0.4s ease;
    }
    .hint-card.visible {
      max-height: 200px; opacity: 1; padding: 14px 16px;
      border-color: rgba(255,200,60,0.35);
      background: rgba(255,180,0,0.07);
    }
    .hint-card.glow-1 {
      border-color: rgba(255,210,60,0.7); background: rgba(255,190,0,0.12);
      box-shadow: 0 0 18px rgba(255,200,40,0.25), 0 0 6px rgba(255,200,40,0.15) inset;
    }
    .hint-card.glow-2 {
      border-color: rgba(255,160,30,0.85); background: rgba(255,150,0,0.16);
      box-shadow: 0 0 28px rgba(255,160,20,0.40), 0 0 10px rgba(255,160,20,0.20) inset;
    }
    @keyframes hintPulse {
      0%   { box-shadow: 0 0 18px rgba(255,200,40,0.25); }
      50%  { box-shadow: 0 0 32px rgba(255,200,40,0.55); }
      100% { box-shadow: 0 0 18px rgba(255,200,40,0.25); }
    }
    .hint-card.pulse-in { animation: hintPulse 0.7s ease; }
    .hint-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
      text-transform: uppercase; color: rgba(255,200,60,0.8); margin-bottom: 6px;
    }
    .hint-text { font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.88); }
    .hint-more-btn {
      display: none; margin-top: 10px; font-size: 12px;
      color: rgba(255,200,60,0.7); background: none;
      border: 1px solid rgba(255,200,60,0.3); border-radius: 8px;
      padding: 4px 10px; cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .hint-more-btn:hover {
      color: rgba(255,220,80,1); border-color: rgba(255,220,80,0.6);
      background: rgba(255,200,40,0.08); transform: none;
    }
    .hint-more-btn.visible { display: inline-block; }

    /* ── Feedback ── */
    .feedback-box {
      padding: 12px 16px; border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.18);
      font-size: 14px; line-height: 1.6; display: none;
    }
    .feedback-box.correct  { border-color: rgba(0,220,140,0.45); background: rgba(0,180,100,0.10); }
    .feedback-box.incorrect{ border-color: rgba(255,100,100,0.40); background: rgba(180,40,40,0.10); }
    .feedback-msg  { font-weight: 700; margin-bottom: 5px; font-size: 15px; }
    .feedback-expl { color: rgba(255,255,255,0.80); }
    .feedback-nudge{ margin-top: 7px; color: rgba(255,200,80,0.85); font-size: 13px; font-style: italic; }

    /* ── Progress ── */
    .progress {
      height: 5px; border-radius: 99px;
      background: rgba(255,255,255,0.10); overflow: hidden;
    }
    .progress-bar {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, rgba(120,140,255,0.8), rgba(0,220,200,0.7));
      transition: width 0.4s ease; width: 0%;
    }

    /* ── Tips strip ── */
    .tips-strip {
      padding: 8px 12px;
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
    }
    .tips-title {
      font-size: 10px; font-weight: 700; letter-spacing: 0.6px;
      text-transform: uppercase; color: rgba(255,255,255,0.40); margin-bottom: 4px;
    }
    .tips-strip ul {
      margin: 0; padding-left: 14px;
    }
    .tips-strip li { font-size: 11px; color: rgba(255,255,255,0.55); line-height: 1.55; }

    /* ── Next wrap ── */
    .next-wrap { display: none; }
    .next-wrap.visible { display: block; }

    /* ── Diff msg ── */
    .diff-msg { font-size: 12px; color: rgba(255,255,255,0.45); min-height: 4px; }

    /* ── Toast ── */
    #toastEl {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(20,24,48,0.97); border: 1px solid rgba(255,255,255,0.18);
      border-radius: 14px; padding: 10px 20px; font-size: 14px; font-weight: 600;
      pointer-events: none; opacity: 0; transition: opacity 0.25s ease; z-index: 100; white-space: nowrap;
    }
    #toastEl.show { opacity: 1; }

    #hintBtn { font-size: 13px; border-color: rgba(255,200,60,0.4); color: rgba(255,210,80,0.9); }
    #hintBtn:hover { background: rgba(255,200,40,0.10); }
    #hintBtn:disabled { opacity: 0.35; cursor: default; transform: none; }
    #finishBtn { font-size: 13px; opacity: 0.6; }

    .sp { margin-top: 10px; }

    /* ── Achiever: gold level chip + progress bar ── */
    .achiever-mode #chipLevel {
      background: linear-gradient(135deg, rgba(255,200,50,0.22), rgba(255,140,0,0.16));
      border: 1px solid rgba(255,200,50,0.55);
      color: rgba(255,220,70,1);
      box-shadow: 0 0 14px rgba(255,190,40,0.18);
    }
    .achiever-mode .progress-bar {
      background: linear-gradient(90deg, rgba(255,200,50,0.9), rgba(255,140,0,0.85));
    }

    /* ── Free Spirit: optional challenge button ── */
    #challengeWrap { display: none; margin-top: 8px; }
    #challengeWrap.visible { display: block; }
    #challengeBtn {
      width: 100%;
      background: linear-gradient(135deg, rgba(100,200,255,0.12), rgba(80,140,255,0.08));
      border: 1px solid rgba(100,180,255,0.32);
      color: rgba(140,210,255,0.95);
      font-weight: 600; font-size: 14px;
    }
    #challengeBtn:hover { background: rgba(100,180,255,0.18); border-color: rgba(100,200,255,0.55); }

    /* ── Leaderboard banner ── */
    .lb-banner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 14px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.025);
      margin-bottom: 10px; text-decoration: none; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .lb-banner:hover {
      background: rgba(255,255,255,0.055);
      border-color: rgba(255,255,255,0.18);
    }
    .lb-banner-left { display: flex; align-items: center; gap: 8px; font-size: 13px; color: rgba(255,255,255,0.55); }
    .lb-banner-lock { font-size: 14px; }
    .lb-banner-badge {
      font-size: 10px; font-weight: 600; letter-spacing: 0.4px;
      color: rgba(255,255,255,0.45); border: 1px solid rgba(255,255,255,0.18);
      border-radius: 6px; padding: 2px 7px;
    }

    /* ── Mini inline leaderboard (Socialiser / Player) ── */
    .mini-lb {
      background: rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 10px 14px; margin-bottom: 10px;
    }
    .mini-lb-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .mini-lb-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.6px;
      text-transform: uppercase; color: rgba(255,255,255,0.35);
    }
    .mini-lb-live {
      display: flex; align-items: center; gap: 4px;
      font-size: 10px; color: rgba(80,220,140,0.7);
    }
    .mini-live-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(80,220,140,0.85);
      animation: miniPulse 1.5s ease-in-out infinite;
    }
    @keyframes miniPulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .mini-lb-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .mini-lb-row:last-child { border-bottom: none; }
    .mini-lb-row.mini-me { font-weight: 700; color: rgba(255,255,255,0.95); }
    .mini-rank { width: 22px; text-align: center; font-size: 14px; flex-shrink: 0; }
    .mini-code { flex: 1; color: rgba(255,255,255,0.75); }
    .mini-code .mini-you { font-size: 9px; color: rgba(120,160,255,0.8);
      background: rgba(120,140,255,0.15); border-radius: 5px; padding: 1px 5px; margin-left: 4px; }
    .mini-xp { font-size: 12px; font-weight: 600; color: rgba(255,220,80,0.85); white-space: nowrap; }
    .mini-active { display:inline-block; width:6px; height:6px; border-radius:50%;
      background:rgba(80,220,140,0.9); margin-left:3px; animation: miniPulse 1.5s ease-in-out infinite; }
    .lb-waiting {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 14px; border-radius: 12px; margin-bottom: 10px;
      border: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.015);
      font-size: 13px; color: rgba(255,255,255,0.28);
    }
  </style>
</head>
<body>
<div class="container">
  <h1 style="margin-bottom:12px;">Quiz Session</h1>

  <!-- ── Leaderboard area (content set by JS based on hexad type) ── -->
  <div id="lbArea">
    <a href="leaderboard.html" target="_blank" class="lb-banner">
      <div class="lb-banner-left">
        <span class="lb-banner-lock">🏆</span>
        <span id="lbBannerText">View Leaderboard</span>
      </div>
      <span id="lbBadge" class="lb-banner-badge">...</span>
    </a>
  </div>

  <div class="card" id="card" style="padding:16px 20px;">

    <!-- ── HUD row: Level · XP · Streak ── -->
    <!-- ── HUD + Tips side by side ── -->
    <div style="display:flex; gap:12px; align-items:flex-start; margin-bottom:10px;">

      <!-- Left: level/xp/streak + hexad/progress -->
      <div style="flex:1; min-width:0;">
        <div class="chips">
          <div class="chip" id="chipLevel" style="font-size:15px; font-weight:700; padding:10px 14px;">🧩 Level 1</div>
          <div class="statRow">
            <div class="stat" style="padding:8px 12px; min-width:0;">
              <div>⭐</div>
              <div><div class="big" id="xpVal" style="font-size:16px;">0</div><div class="label">XP</div></div>
            </div>
            <div class="stat" style="padding:8px 12px; min-width:0;">
              <div>🔥</div>
              <div><div class="big" id="streakVal" style="font-size:16px;">0</div><div class="label">Streak</div></div>
            </div>
          </div>
        </div>
        <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:8px;">
          <span id="hexadBadge" style="
            font-size:12px; font-weight:600; color:rgba(255,255,255,0.55);
            background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12);
            border-radius:8px; padding:3px 10px; white-space:nowrap;">Hexad: —</span>
          <div style="flex:1; min-width:100px;">
            <div class="tiny" id="progressText" style="margin-bottom:3px; color:rgba(255,255,255,0.40);">0 / 7</div>
            <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
          </div>
        </div>
      </div>

      <!-- Right: tips -->
      <div class="tips-strip" style="flex:0 0 42%; max-width:42%; margin-top:0;">
        <div class="tips-title" id="tipsTitle">Tips</div>
        <ul id="tipsList"></ul>
      </div>

    </div>

    <hr style="margin:0 0 12px;" />

    <!-- ── Question prompt ── -->
    <pre id="prompt" style="margin:0 0 10px; font-size:14px; line-height:1.6;">Loading question...</pre>

    <!-- ── Answer options ── -->
    <div id="options"></div>

    <!-- ── Hint card — hidden until triggered ── -->
    <div class="hint-card sp" id="hintCard">
      <div class="hint-label" id="hintLabel">💡 Hint</div>
      <div class="hint-text"  id="hintText"></div>
      <button class="hint-more-btn" id="hintMoreBtn">Try a more detailed hint →</button>
    </div>

    <!-- ── Action buttons ── -->
    <div class="row sp" style="gap:10px; flex-wrap:wrap;">
      <button id="hintBtn">💡 Hint</button>
      <button class="btn-primary" id="submitBtn">Submit Answer</button>
      <button id="finishBtn">🏁 Finish</button>
    </div>

    <!-- ── Feedback box — hidden until answer submitted ── -->
    <div class="feedback-box sp" id="feedbackBox">
      <div class="feedback-msg"   id="feedbackMsg"></div>
      <div class="feedback-expl"  id="feedbackExpl"></div>
      <div class="feedback-nudge" id="feedbackNudge"></div>
    </div>

    <div class="diff-msg sp" id="diffMsg"></div>

    <div class="next-wrap sp" id="nextWrap">
      <button class="btn-primary" id="nextBtn" style="width:100%;">Next Question →</button>
    </div>

    <div id="challengeWrap">
      <button id="challengeBtn">🧭 Would you like to try the next challenge?</button>
    </div>

    <p id="err" class="small" style="color:rgba(255,100,100,0.8); margin-top:2px; min-height:4px;"></p>

  </div><!-- /card -->
</div><!-- /container -->

<div id="toastEl"></div>

<script type="module">
  import { api, loadState, saveState } from "./api.js";

  const state = loadState();
  if (!state.user_id) { window.location.href = "index.html"; }

  const chipLevel    = document.getElementById("chipLevel");
  const progressText = document.getElementById("progressText");
  const progressBar  = document.getElementById("progressBar");
  const hexadBadge   = document.getElementById("hexadBadge");
  const prompt       = document.getElementById("prompt");
  const optionsDiv   = document.getElementById("options");
  const hintCard     = document.getElementById("hintCard");
  const hintLabel    = document.getElementById("hintLabel");
  const hintText     = document.getElementById("hintText");
  const hintMoreBtn  = document.getElementById("hintMoreBtn");
  const hintBtn      = document.getElementById("hintBtn");
  const submitBtn    = document.getElementById("submitBtn");
  const feedbackBox  = document.getElementById("feedbackBox");
  const feedbackMsg  = document.getElementById("feedbackMsg");
  const feedbackExpl = document.getElementById("feedbackExpl");
  const feedbackNudge= document.getElementById("feedbackNudge");
  const diffMsg      = document.getElementById("diffMsg");
  const nextWrap     = document.getElementById("nextWrap");
  const nextBtn        = document.getElementById("nextBtn");
  const challengeWrap  = document.getElementById("challengeWrap");
  const challengeBtn   = document.getElementById("challengeBtn");
  const finishBtn      = document.getElementById("finishBtn");
  const err            = document.getElementById("err");
  const toastEl        = document.getElementById("toastEl");

  let sessionId       = null;
  let currentQuestion = null;
  let pendingQuestion = null;
  let startTime       = null;
  let retryCount      = 0;
  let hintLevelShown  = 0;
  let answered        = false;
  let timerHandle     = null;
  let prevLevel       = 1;
  let hexadType       = "Unknown";

  let toastTimer = null;
  function showToast(msg, duration = 3000) {
    if (!msg) return;
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), duration);
  }

  function updateHUD(data) {
    const lvl = data.updated_difficulty_level ?? data.difficulty_level ?? 1;
    const isAchiever = hexadType === "Achiever";
    chipLevel.textContent = isAchiever ? `🏅 Mastery Lv. ${lvl}` : `🧩 Level ${lvl}`;
    if (isAchiever && lvl > prevLevel) {
      showToast(`🏆 Mastery Level Up! You're now at Level ${lvl}`);
    }
    prevLevel = lvl;
    document.getElementById("xpVal").textContent     = data.xp ?? 0;
    document.getElementById("streakVal").textContent = data.streak ?? 0;
    const done  = data.questions_answered ?? 0;
    const total = data.session_total_questions ?? 7;
    progressText.textContent = `${done} / ${total}`;
    progressBar.style.width  = `${Math.round((done / total) * 100)}%`;
  }

  function showHintCard(level, text) {
    hintCard.classList.remove("glow-1", "glow-2", "pulse-in");
    hintLabel.textContent = level === 1 ? "💡 Hint" : "💡 Detailed Hint";
    hintText.textContent  = text;
    hintCard.classList.add("visible");
    void hintCard.offsetWidth;
    hintCard.classList.add(level === 1 ? "glow-1" : "glow-2", "pulse-in");
    setTimeout(() => hintCard.classList.remove("pulse-in"), 800);
    hintMoreBtn.classList.toggle("visible", level === 1);
  }

  function hideHintCard() {
    hintCard.classList.remove("visible", "glow-1", "glow-2", "pulse-in");
    hintMoreBtn.classList.remove("visible");
    hintLevelShown = 0;
  }

  // Hint thresholds scale with difficulty level:
  // Levels 1-2: 45s / 75s  (standard)
  // Level 3:    55s / 85s  (+10s)
  // Level 4:    65s / 95s  (+20s)
  // Level 5:    75s / 105s (+30s)
  // Hint trigger thresholds by difficulty level:
  // Level 1: hint1=45s,  hint2=75s
  // Level 2: hint1=45s,  hint2=75s
  // Level 3: hint1=55s,  hint2=85s
  // Level 4: hint1=80s,  hint2=110s
  // Level 5: hint1=110s, hint2=140s
  function hintThresholds(level) {
    const thresholds = {
      1: { h1: 45,  h2: 75  },
      2: { h1: 45,  h2: 75  },
      3: { h1: 55,  h2: 85  },
      4: { h1: 80,  h2: 110 },
      5: { h1: 110, h2: 140 },
    };
    return thresholds[level] ?? { h1: 45, h2: 75 };
  }

  function startHintTimer() {
    clearInterval(timerHandle);
    timerHandle = setInterval(async () => {
      if (answered || !currentQuestion || !sessionId) return;
      const elapsed  = Math.floor((Date.now() - startTime) / 1000);
      const level    = currentQuestion.difficulty || 1;
      const { h1, h2 } = hintThresholds(level);
      if (elapsed >= h1 && hintLevelShown < 1) await fetchAndShowHint(1, true);
      if (elapsed >= h2 && hintLevelShown < 2) await fetchAndShowHint(2, true);
    }, 5000);
  }

  async function fetchAndShowHint(targetLevel, auto = false) {
    if (hintLevelShown >= targetLevel) return;
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    try {
      const out = await api(
        `/sessions/${sessionId}/hint` +
        `?user_id=${state.user_id}` +
        `&question_id=${currentQuestion.id}` +
        `&time_spent_seconds=${elapsed}` +
        `&retry_count=${retryCount}` +
        `&current_hint_level=${hintLevelShown}`,
        "POST"
      );
      hintLevelShown = out.hint_level;
      showHintCard(out.hint_level, out.hint_text);
      if (auto && targetLevel === 1) showToast("💡 Hint appeared — taking a while?");
    } catch (_) { /* silent */ }
  }

  function renderQuestion(q) {
    currentQuestion  = q;
    pendingQuestion  = null;
    retryCount       = 0;
    answered         = false;
    startTime        = Date.now();

    hideHintCard();
    feedbackBox.style.display = "none";
    feedbackBox.className     = "feedback-box sp";
    feedbackMsg.textContent   = "";
    feedbackExpl.textContent  = "";
    feedbackNudge.textContent = "";
    diffMsg.textContent       = "";
    nextWrap.classList.remove("visible");
    challengeWrap.classList.remove("visible");
    err.textContent           = "";

    hintBtn.disabled      = false;
    hintBtn.textContent   = "💡 Hint";
    submitBtn.disabled    = false;
    submitBtn.textContent = "Submit Answer";

    prompt.textContent = q.prompt;
    optionsDiv.innerHTML = q.options.map(opt => {
      const escaped = opt.replace(/&/g, "&amp;").replace(/"/g, "&quot;");
      return `<label class="option"><input type="radio" name="ans" value="${escaped}"><span>${opt}</span></label>`;
    }).join("");

    startHintTimer();
  }

  function selectedAnswer() {
    const el = document.querySelector('input[name="ans"]:checked');
    return el ? el.value : "";
  }

  function applyHexadUI(hexad) {
    hexadType = hexad;
    const card = document.getElementById("card");

    if (hexad === "Achiever") {
      card.classList.add("achiever-mode");
    }

    const tips = {
      "Player":        ["Go for quick wins; fast + correct = level up.", "Try one attempt before hints for max XP.", "Keep streaks alive to farm XP."],
      "Achiever":      ["No-hint + under 40s answers level you up faster.", "Use hints only as a last resort.", "Focus on accuracy over speed."],
      "Socialiser":    ["Hints are normal; many learners use them.", "Steady progress matters more than speed.", "Review explanations to improve over time."],
      "Free Spirit":   ["Optional challenges appear after correct answers; take them if you want a harder question.", "Explore different approaches before hints.", "Speed matters less than experimenting."],
      "Philanthropist":["Use hints to understand the concept, not just the answer.", "Read explanations carefully.", "Consistency wins."],
      "Disruptor":     ["Try an alternative method if your first fails.", "Trace with small examples mentally.", "Use Hint 1 then attempt immediately."],
      "Unknown":       ["Answer quickly + correctly to level up.", "Hints help but reduce your strong-correct streak.", "Streak boosts momentum."],
    };
    document.getElementById("tipsTitle").textContent = "Tips For You";
    document.getElementById("tipsList").innerHTML =
      (tips[hexad] || tips["Unknown"]).slice(0, 2).map(t => `<li>${t}</li>`).join("");
  }

  async function start() {
    try {
      const out = await api("/sessions/start", "POST", { user_id: state.user_id });
      sessionId = out.session_id;
      prevLevel = out.difficulty_level ?? 1;
      saveState({ ...state, session_id: sessionId, session_number: out.session_number, hexad_type: out.hexad_type, settings: out.settings, summary: null,
        _q: out.question, _hud: { xp: 0, streak: 0, done: 0, total: out.session_total_questions, level: out.difficulty_level } });
      hexadBadge.textContent = `${out.hexad_type}  ·  Session #${out.session_number}`;
      applyHexadUI(out.hexad_type);
      updateHUD(out);
      renderQuestion(out.question);
      showToast("🎮 Session started! Earn XP and build a streak.");
    } catch (e) {
      err.textContent = e?.message || "Could not start session. Is the backend running?";
    }
  }

  hintBtn.onclick = async () => {
    err.textContent = "";
    if (!sessionId || !currentQuestion || answered) return;
    await fetchAndShowHint(hintLevelShown >= 1 ? 2 : 1);
    if (hintLevelShown >= 2) {
      hintBtn.disabled    = true;
      hintBtn.textContent = "💡 Max hint shown";
    }
  };

  hintMoreBtn.onclick = async () => {
    await fetchAndShowHint(2);
    hintMoreBtn.classList.remove("visible");
  };

  submitBtn.onclick = async () => {
    err.textContent = "";
    const ans = selectedAnswer();
    if (!ans) { err.textContent = "Pick an answer first."; return; }
    if (answered) return;

    const timeSpent = Math.floor((Date.now() - startTime) / 1000);
    submitBtn.disabled = true;

    try {
      const out = await api(`/sessions/${sessionId}/answer`, "POST", {
        user_id:            state.user_id,
        question_id:        currentQuestion.id,
        answer:             ans,
        time_spent_seconds: timeSpent,
        retry_count:        retryCount,
        hint_level_shown:   hintLevelShown,
      });

      updateHUD(out);
      feedbackBox.style.display = "block";

      if (out.correct) {
        answered = true;
        clearInterval(timerHandle);
        feedbackBox.classList.remove("incorrect");
        feedbackBox.classList.add("correct");
        feedbackMsg.textContent  = out.feedback_message;
        feedbackExpl.textContent = out.explanation;
        feedbackNudge.textContent= "";
        if (out.difficulty_message) diffMsg.textContent = out.difficulty_message;
        // Advance saved state to next question so restore never re-answers this one
        saveState({ ...loadState(), _q: out.next_question || null, _session_done: !out.next_question, _hud: {
          xp: out.xp, streak: out.streak, done: out.questions_answered,
          total: out.session_total_questions, level: out.updated_difficulty_level,
        }});
        if (out.next_question) {
          pendingQuestion = out.next_question;
          if (hexadType === "Free Spirit" || hexadType === "Disruptor") {
            challengeWrap.classList.add("visible");
          } else {
            nextWrap.classList.add("visible");
          }
        } else {
          diffMsg.textContent += (diffMsg.textContent ? "  ·  " : "") + "🏁 Session complete — click Finish.";
        }
      } else {
        retryCount += 1;
        feedbackBox.classList.add("incorrect");
        feedbackMsg.textContent  = out.feedback_message;
        feedbackExpl.textContent = "";

        if (retryCount >= 2) {
          await fetchAndShowHint(1);
          if (hintText.textContent) {
            feedbackNudge.textContent = `→ ${hintText.textContent.replace(/^.*?:\s*/, "")}`;
          }
        }

        if (retryCount >= 2 && hintLevelShown > 0) {
          feedbackNudge.textContent += "\n\nThis question will come back next session. Moving on...";
          submitBtn.disabled = true;
          setTimeout(() => doSkip(), 2200);
        } else {
          submitBtn.disabled    = false;
          submitBtn.textContent = "Try Again";
        }
      }
    } catch (e) {
      submitBtn.disabled = false;
      err.textContent = e?.message || "Submission failed.";
    }
  };

  async function doSkip() {
    try {
      const out = await api(
        `/sessions/${sessionId}/skip?user_id=${state.user_id}&question_id=${currentQuestion.id}`,
        "POST"
      );
      updateHUD(out);
      saveState({ ...loadState(), _q: out.next_question || null, _hud: {
        xp: out.xp, streak: out.streak, done: out.questions_answered,
        total: out.session_total_questions, level: out.updated_difficulty_level,
      }});
      if (out.next_question) {
        renderQuestion(out.next_question);
      } else {
        clearInterval(timerHandle);
        diffMsg.textContent = "🏁 Session complete — click Finish.";
        submitBtn.disabled  = true;
      }
    } catch (e) {
      err.textContent = e?.message || "Skip failed.";
    }
  }

  nextBtn.onclick = () => { if (pendingQuestion) renderQuestion(pendingQuestion); };

  challengeBtn.onclick = () => {
    if (pendingQuestion) {
      showToast("🧭 Challenge accepted! Good luck.");
      renderQuestion(pendingQuestion);
    }
  };

  finishBtn.onclick = async () => {
    err.textContent = "";
    clearInterval(timerHandle);
    try {
      const out = await api(`/sessions/${sessionId}/finish?user_id=${state.user_id}`, "POST");
      saveState({ ...state, session_id: sessionId, summary: out, _q: null, _hud: null, _session_done: false });
      window.location.href = "summary.html";
    } catch (e) {
      err.textContent = e?.message || "Could not finish session.";
    }
  };

  // Set Philanthropist banner text immediately from saved state (before start() resolves)
  if ((state.hexad_type || "").trim() === "Philanthropist") {
    const t = document.getElementById("lbBannerText");
    if (t) t.textContent = "View Class Progress";
  }

  let lbPollHandle = null;

  function medalFor(r) { return r===1?"🥇":r===2?"🥈":r===3?"🥉":`#${r}`; }

  function renderMiniLb(lb) {
    const myName = (state.display_name || "").toLowerCase();
    const top5   = lb.overall.slice(0, 5);
    const rows   = top5.map(e => {
      const isMe = myName && e.display_name.toLowerCase() === myName;
      return `<div class="mini-lb-row${isMe ? " mini-me" : ""}">
        <span class="mini-rank">${medalFor(e.rank)}</span>
        <span class="mini-code">${e.display_name}${isMe ? '<span class="mini-you">you</span>' : ""}
          ${e.is_active ? '<span class="mini-active"></span>' : ""}</span>
        <span class="mini-xp">⚡ ${e.total_xp}</span>
      </div>`;
    }).join("");
    document.getElementById("lbArea").innerHTML = `
      <div class="mini-lb">
        <div class="mini-lb-header">
          <span class="mini-lb-title">🏆 Leaderboard</span>
          <span class="mini-lb-live"><span class="mini-live-dot"></span>Live</span>
        </div>
        ${rows}
      </div>`;
  }

  function renderLbWaiting() {
    document.getElementById("lbArea").innerHTML =
      `<div class="lb-waiting"><span>🏆 Leaderboard</span><span>Waiting for others to join...</span></div>`;
  }

  async function updateLbArea() {
    try {
      const lb  = await api("/leaderboard");
      const hx  = (hexadType || state.hexad_type || "").trim();

      if (hx === "Socialiser" || hx === "Player") {
        if (lb.total_users >= 2) renderMiniLb(lb);
        else                     renderLbWaiting();
        return;  // no badge to update — area was replaced
      }

      // Achiever / Free Spirit / Disruptor / Philanthropist — just update badge text
      const badge = document.getElementById("lbBadge");
      if (badge) badge.textContent = lb.total_users >= 2 ? `${lb.total_users} participants` : "Just you so far";

      // Confirm Philanthropist text (in case start() hadn't resolved when we initialised)
      if (hx === "Philanthropist") {
        const t = document.getElementById("lbBannerText");
        if (t) t.textContent = "View Class Progress";
      }
    } catch { /* silent */ }
  }

  // If there's already an active session saved (e.g. user navigated away and back),
  // restore it instead of starting a brand new session.
  function restoreHUD() {
    sessionId = state.session_id;
    hexadType = state.hexad_type || "Unknown";
    prevLevel = state._hud?.level ?? 1;
    applyHexadUI(hexadType);
    hexadBadge.textContent = `${hexadType}  ·  Session #${state.session_number ?? 1}`;
    updateHUD({
      updated_difficulty_level: state._hud?.level ?? 1,
      xp:                       state._hud?.xp    ?? 0,
      streak:                   state._hud?.streak ?? 0,
      questions_answered:       state._hud?.done   ?? 0,
      session_total_questions:  state._hud?.total  ?? 7,
    });
  }

  if (state.session_id && state._session_done) {
    // Session was complete — restore "click Finish" state without starting a new one
    restoreHUD();
    prompt.textContent    = "Session complete!";
    optionsDiv.innerHTML  = "";
    submitBtn.disabled    = true;
    hintBtn.disabled      = true;
    diffMsg.textContent   = "🏁 Session complete — click Finish.";
    showToast("📍 Session restored — click Finish to save your results.");
    updateLbArea();
    lbPollHandle = setInterval(updateLbArea, 10_000);
  } else if (state.session_id && state._q) {
    restoreHUD();
    renderQuestion(state._q);
    showToast("📍 Session restored.");
    updateLbArea();
    lbPollHandle = setInterval(updateLbArea, 10_000);
  } else {
    start().then(() => {
      updateLbArea();
      lbPollHandle = setInterval(updateLbArea, 10_000);
    });
  }
</script>
</body>
